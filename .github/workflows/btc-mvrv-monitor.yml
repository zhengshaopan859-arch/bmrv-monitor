name: BTC 指标推送

on:
  schedule:
    # 北京时间 12:00 = UTC 4:00
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  btc-mvrv-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 Playwright 和依赖
        run: |
          pip install playwright requests
          playwright install chromium

      - name: 获取 BTC MVRV 指标并推送
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python btc_mvrv_monitor.py
